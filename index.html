<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://app.snipcart.com">
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.7.1/default/snipcart.css">

    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f5f6f8; color: #1f2937; }
    header { background: #1f4e79; color: #fff; padding: 24px 32px; }
    header h1 { margin: 0; font-size: 22px; }
    header p { margin: 4px 0 0; opacity: .8; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; padding: 32px; max-width: 900px; margin: 0 auto; }
    .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card h2 { font-size: 17px; margin: 0 0 6px; }
    .card .price { font-weight: 700; color: #1f4e79; margin-bottom: 12px; }
    .card p { font-size: 13px; color: #6b7280; }
    button.snipcart-add-item { background: #1f4e79; color: #fff; border: 0; border-radius: 6px; padding: 10px 16px; font-size: 14px; cursor: pointer; }
    button.snipcart-add-item:hover { background: #163a5c; }
    .cart-btn { position: fixed; top: 18px; right: 24px; background: #fff; color: #1f4e79; border: 0; border-radius: 6px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>

  <header>
    <h1>Exact Solution Electronics — Snipcart Test Store</h1>
    <p>ExactFlow integration R&amp;D — test mode</p>
    <button class="cart-btn snipcart-checkout">🛒 Cart (<span class="snipcart-items-count">0</span>)</button>
  </header>

  <div class="grid">
    <div class="card">
      <h2>ExactFlow Test Widget</h2>
      <div class="price">49.00 PLN</div>
      <p>Physical test product for order + fulfillment round.</p>
      <button class="snipcart-add-item"
        data-item-id="EXF-WIDGET-001"
        data-item-name="ExactFlow Test Widget"
        data-item-price="49.00"
        data-item-url="/snipcart-test/"
        data-item-description="Physical test product for ExactFlow integration"
        data-item-quantity="1"
        data-item-max-quantity="10">
        Add to cart
      </button>
    </div>

    <div class="card">
      <h2>ExactFlow Test Gadget</h2>
      <div class="price">99.00 PLN</div>
      <p>Second product for multi-item order testing.</p>
      <button class="snipcart-add-item"
        data-item-id="EXF-GADGET-002"
        data-item-name="ExactFlow Test Gadget"
        data-item-price="99.00"
        data-item-url="/snipcart-test/"
        data-item-description="Second physical test product"
        data-item-quantity="1"
        data-item-max-quantity="10">
        Add to cart
      </button>
    </div>
  </div>
